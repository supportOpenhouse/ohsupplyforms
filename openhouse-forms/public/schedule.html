<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>Openhouse — Visit Schedule</title><link rel="icon" type="image/png" href="/images/favicon.png">
<link rel="stylesheet" href="/css/styles.css">
<style>
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;display:none;align-items:center;justify-content:center;padding:16px}
.confirm-overlay.open{display:flex}
.confirm-box{background:var(--sf);border-radius:12px;width:100%;max-width:420px;box-shadow:0 12px 40px rgba(0,0,0,.25);overflow:hidden;max-height:85vh;display:flex;flex-direction:column}
.confirm-hdr{padding:14px 18px;border-bottom:1px solid var(--bd);background:var(--bg)}
.confirm-hdr h3{font-size:14px;font-weight:700;margin:0}
.confirm-hdr p{font-size:11px;color:var(--tx3);margin:2px 0 0}
.confirm-body{padding:12px 18px;overflow-y:auto;flex:1}
.confirm-ftr{padding:12px 18px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end}
.ep-table{width:100%;border-collapse:collapse;font-size:11px}
.ep-table th{text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);padding:6px 8px;border-bottom:2px solid var(--bd);font-weight:600}
.ep-table td{padding:6px 8px;border-bottom:1px solid var(--bd)}
.ep-table tr:last-child td{border-bottom:none}
.ep-empty{text-align:center;padding:20px;color:var(--grn);font-size:12px;font-weight:500}
.ep-new{background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:14px 18px;margin-bottom:14px}
.ep-new-t{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:#92400e;font-weight:600;margin-bottom:10px}
.ep-new-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px 16px;font-size:13px;font-weight:500;color:var(--tx)}
.ep-new-row span{display:flex;flex-direction:column;gap:3px}
.ep-new-row .epl{font-size:8px;text-transform:uppercase;color:#92400e;font-weight:600;letter-spacing:.05em}
.busy-timeline{margin-top:8px;display:flex;flex-direction:column;gap:4px}
.busy-timeline .bt-title{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);font-weight:600}
.busy-slot{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:6px;background:#fef2f2;border:1px solid #fecaca;font-size:11px}
.busy-slot .bs-time{font-weight:700;color:#b33a2e;font-family:var(--mono);white-space:nowrap}
.busy-slot .bs-dash{color:#e5a3a0}
.busy-slot .bs-info{color:#92400e;font-size:10px}
.free-hint{font-size:10px;color:var(--grn);font-weight:500;margin-top:4px}
.slot-conflict{font-size:11px;color:#b33a2e;font-weight:500;margin-top:4px;display:none}
/* Custom time picker */
.ctp-wrap{position:relative}
.ctp-input{cursor:pointer;background:var(--sf)!important;font-size:16px;font-weight:600;font-family:var(--mono)}
.ctp-dropdown{display:none;position:absolute;top:100%;left:0;right:0;z-index:50;background:var(--sf);border:1px solid var(--bd);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.12);margin-top:4px;max-height:240px;overflow-y:auto}
.ctp-dropdown.open{display:block}
.ctp-slots{display:flex;flex-direction:column}
.ctp-slot{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--bg);font-size:13px;transition:.1s}
.ctp-slot:last-child{border-bottom:none}
.ctp-slot:hover:not(.ctp-busy){background:var(--bg)}
.ctp-slot.ctp-selected{background:var(--ac);color:#fff}
.ctp-slot.ctp-selected .ctp-tag{background:rgba(255,255,255,.2);color:#fff}
.ctp-slot.ctp-busy{background:#fef2f2;cursor:not-allowed;color:#b33a2e}
.ctp-slot.ctp-busy .ctp-label{text-decoration:line-through;opacity:.5}
.ctp-slot .ctp-label{font-weight:600;font-family:var(--mono)}
.ctp-slot .ctp-tag{font-size:8px;text-transform:uppercase;font-weight:600;letter-spacing:.04em;padding:2px 6px;border-radius:4px}
.ctp-slot.ctp-busy .ctp-tag{background:#fecaca;color:#b33a2e}
.ctp-slot:not(.ctp-busy) .ctp-tag{background:#d1fae5;color:#065f46}
</style>
</head>
<body>
<header class="hdr">
  <a href="/" class="hdr-logo"><img src="/images/logo_2.png" alt="Openhouse" style="height:32px"></a>
  <div class="hdr-right"><div class="form-name">Visit Schedule</div></div>
  <div class="hdr-right"></div>
</header>
<div class="ctn">
  <form id="form">
    <div class="card">
      <div class="card-t">UID Generator</div>
      <div class="r2">
        <div class="fg"><label>City <span class="req">*</span></label><select name="city" id="selCity" required></select><div class="err-msg">Required</div></div>
        <div class="fg"><label>Source <span class="req">*</span></label><div class="radios" id="srcGroup"></div><div class="err-msg">Required</div></div>
      </div>
      <div class="uid-display empty" id="uidBox">Select city & source above</div>
      <input type="hidden" name="uid" id="fUid">
    </div>

    <div class="card">
      <div class="card-t">Schedule</div>
      <div class="fg"><label>Lead ID (OPTIONAL)</label><input type="text" name="lead_id"></div>
      <div class="r2">
        <div class="fg"><label>Date <span class="req">*</span></label><input type="date" name="schedule_date" id="schedDate" required><div class="err-msg">Required</div></div>
        <div class="fg" id="timeFg"><label>Time <span class="req">*</span></label>
          <div class="ctp-wrap" id="ctpWrap">
            <input type="text" id="schedTimeDisplay" readonly placeholder="Select time" class="ctp-input">
            <input type="hidden" name="schedule_time" id="schedTime">
            <div class="ctp-dropdown" id="ctpDrop">
              <div class="ctp-slots" id="ctpSlots"></div>
            </div>
          </div>
          <div class="err-msg">Required</div>
          <div class="slot-conflict" id="slotConflict"></div></div>
      </div>
      <div id="slotSection" style="display:none">
        <div class="busy-timeline">
          <div class="bt-title">Schedule for <strong id="slotExecName"></strong> on <strong id="slotDateLabel"></strong></div>
          <div id="busyList"></div>
          <div class="free-hint" id="freeHint"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-t">Owner / Broker</div>
      <div class="r2">
        <div class="fg"><label>First Name <span class="req">*</span></label><input type="text" name="first_name" required><div class="err-msg">Required</div></div>
        <div class="fg"><label>Last Name</label><input type="text" name="last_name"></div>
      </div>
      <div class="fg"><label>Contact No. <span class="req">*</span></label><input type="tel" name="contact_no" id="phone" maxlength="10" required><div class="inline-err" id="phoneErr"></div><div class="err-msg">Required</div></div>
    </div>

    <div class="card">
      <div class="card-t">Property Info</div>
      <div class="r2">
        <div class="fg"><label>Society <span class="req">*</span></label><select name="society_name" id="selSoc" required disabled><option value="">City first</option></select><div class="err-msg">Required</div></div>
        <div class="fg"><label>Locality <span class="req">*</span></label><select name="locality" id="selLoc" required disabled><option value="">Society first</option></select><div class="err-msg">Required</div></div>
      </div>
      <div class="r3">
        <div class="fg"><label>Unit No.</label><input type="text" name="unit_no"></div>
        <div class="fg"><label>Tower No.</label><input type="text" name="tower_no"></div>
        <div class="fg"><label>Floor</label><select name="floor" id="selFloor"></select></div>
      </div>
      <div class="r3">
        <div class="fg" id="areaFg">
          <label>Area (in sqft) <span class="req">*</span></label>
          <select name="area_sqft" id="selArea" required><option value="">Society first</option></select>
          <input type="number" id="areaManual" name="area_manual" min="1" style="display:none;margin-top:4px">
          <div class="err-msg">Required</div>
        </div>
        <div class="fg"><label>Configuration <span class="req">*</span></label><select name="configuration" id="selConfig" required></select><div class="err-msg">Required</div></div>
        <div class="fg"><label>Ask (in Lakhs)</label><input type="number" name="demand_price" step="0.01"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-t">Assignment</div>
      <div class="r2">
        <div class="fg"><label>Assigned By <span class="req">*</span></label><select name="assigned_by" id="selAB" required><option value="">Select...</option></select><div class="err-msg">Required</div></div>
        <div class="fg"><label>Assigned To <span class="req">*</span></label><select name="field_exec" id="selAT" required><option value="">Select...</option></select><div class="err-msg">Required</div></div>
      </div>
    </div>

    <button type="button" class="btn btn-dark" id="submitBtn" style="width:100%">Create Visit Schedule</button>
  </form>
</div>

<!-- Confirmation popup -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-hdr"><h3>Confirm Schedule</h3><p id="confirmSociety"></p></div>
    <div class="confirm-body">
      <div class="ep-new" id="confirmNew"></div>
      <div id="confirmExisting"></div>
    </div>
    <div class="confirm-ftr">
      <button type="button" class="btn btn-out btn-sm" onclick="closeConfirm()">← Go Back</button>
      <button type="button" class="btn btn-dark btn-sm" id="confirmSubmitBtn">Confirm & Submit</button>
    </div>
  </div>
</div>

<script src="/js/shared.js"></script>
<script>
let opts,pendingBody=null,busyWindows=[];
const SLOT_START=8,SLOT_END=20;
const SLOTS=[];for(let h=SLOT_START;h<SLOT_END;h++){SLOTS.push(`${String(h).padStart(2,'0')}:00`);SLOTS.push(`${String(h).padStart(2,'0')}:30`)}SLOTS.push(`${SLOT_END}:00`);

function fmtTime12(t){if(!t)return'';const[h,m]=t.split(':');const hr=parseInt(h);return`${hr===0?12:hr>12?hr-12:hr}:${m.padStart(2,'0')} ${hr>=12?'PM':'AM'}`}
function timeToMin(t){const[h,m]=t.split(':').map(Number);return h*60+m}
function minToTime(m){const h=Math.floor(m/60),mm=m%60;return`${String(h).padStart(2,'0')}:${String(mm).padStart(2,'0')}`}

function isSlotBusy(slotTime){
  const selMin=timeToMin(slotTime);const newEnd=selMin+30;
  return busyWindows.find(w=>selMin<w.endMin&&newEnd>w.startMin)||null;
}

function isSlotPast(slotTime){
  const selDate=document.getElementById('schedDate').value;
  if(!selDate)return false;
  const today=new Date().toISOString().split('T')[0];
  if(selDate!==today)return false;
  const now=new Date();const nowMin=now.getHours()*60+now.getMinutes();
  return timeToMin(slotTime)<nowMin;
}

function buildTimePicker(){
  const grid=document.getElementById('ctpSlots');
  grid.innerHTML=SLOTS.map(t=>{
    const past=isSlotPast(t);
    const hit=isSlotBusy(t);
    const cls=past?'ctp-slot ctp-busy':hit?'ctp-slot ctp-busy':'ctp-slot';
    const tag=past?`<span class="ctp-tag">Passed</span>`:hit?`<span class="ctp-tag">${hit.uid}</span>`:`<span class="ctp-tag">Free</span>`;
    return`<div class="${cls}" data-time="${t}"><span class="ctp-label">${fmtTime12(t)}</span>${tag}</div>`;
  }).join('');
  // Click handlers for free slots
  grid.querySelectorAll('.ctp-slot:not(.ctp-busy)').forEach(el=>{
    el.addEventListener('click',()=>{
      const t=el.dataset.time;
      document.getElementById('schedTime').value=t;
      document.getElementById('schedTimeDisplay').value=fmtTime12(t);
      grid.querySelectorAll('.ctp-slot').forEach(s=>s.classList.remove('ctp-selected'));
      el.classList.add('ctp-selected');
      document.getElementById('ctpDrop').classList.remove('open');
      validateTimeSlot();
    });
  });
}

// Toggle dropdown
document.addEventListener('click',e=>{
  const wrap=document.getElementById('ctpWrap');
  const drop=document.getElementById('ctpDrop');
  if(wrap.contains(e.target)){
    if(!drop.classList.contains('open')){drop.classList.add('open');
      // Scroll to first free slot
      const first=drop.querySelector('.ctp-slot:not(.ctp-busy)');if(first)first.scrollIntoView({block:'center'})}
    else if(e.target.closest('.ctp-input'))drop.classList.remove('open');
  }else{drop.classList.remove('open')}
});

async function loadBusySlots(){
  const exec=document.getElementById('selAT').value;
  const date=document.getElementById('schedDate').value;
  const section=document.getElementById('slotSection');
  const conflict=document.getElementById('slotConflict');
  conflict.style.display='none';
  busyWindows=[];
  // Reset time picker
  buildTimePicker();
  if(!exec||!date){section.style.display='none';return}
  try{
    const r=await fetch(`${API}/api/schedule/busy-slots?field_exec=${encodeURIComponent(exec)}&date=${date}`);
    const slots=await r.json();
    busyWindows=slots.map(s=>{
      const start=timeToMin(s.time);
      const end=start+30;
      return{startMin:start,endMin:end,time:s.time,uid:s.uid,society:s.society||'',tower:s.tower||'',unit:s.unit||''};
    }).sort((a,b)=>a.startMin-b.startMin);
    // Rebuild time picker with busy info
    buildTimePicker();
    // Highlight current selection
    const cur=document.getElementById('schedTime').value;
    if(cur){const sel=document.querySelector(`.ctp-slot[data-time="${cur}"]`);if(sel&&!sel.classList.contains('ctp-busy'))sel.classList.add('ctp-selected')}
    // Busy timeline
    document.getElementById('slotExecName').textContent=exec;
    const dt=new Date(date+'T00:00');
    document.getElementById('slotDateLabel').textContent=dt.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
    const list=document.getElementById('busyList');
    if(busyWindows.length){
      list.innerHTML=busyWindows.map(w=>{
        const from=fmtTime12(w.time);const to=fmtTime12(minToTime(w.endMin));
        const info=[w.society,w.tower?'T'+w.tower:'',w.unit].filter(Boolean).join(' ');
        return`<div class="busy-slot"><span class="bs-time">${from}</span><span class="bs-dash">→</span><span class="bs-time">${to}</span><span class="bs-info">${info} (${w.uid})</span></div>`;
      }).join('');
    }else{list.innerHTML=''}
    const hint=document.getElementById('freeHint');hint.style.color='';
    const freeSlots=getFreeWindows();
    if(busyWindows.length&&freeSlots.length){
      hint.style.color='var(--grn)';hint.textContent='✓ Free: '+freeSlots.map(f=>fmtTime12(minToTime(f.start))+' – '+fmtTime12(minToTime(f.end))).join(', ');
    }else if(busyWindows.length&&!freeSlots.length){
      hint.textContent='✗ No free slots available today';hint.style.color='var(--red)';
    }else{hint.textContent='✓ All slots free';hint.style.color='var(--grn)'}
    section.style.display='block';
    validateTimeSlot();
  }catch(e){console.error('Slots:',e);section.style.display='none';busyWindows=[];buildTimePicker()}
}

function getFreeWindows(){
  const dayStart=SLOT_START*60,dayEnd=SLOT_END*60;
  if(!busyWindows.length)return[{start:dayStart,end:dayEnd}];
  const free=[];let cursor=dayStart;
  for(const w of busyWindows){if(w.startMin>cursor)free.push({start:cursor,end:w.startMin});cursor=Math.max(cursor,w.endMin)}
  if(cursor<dayEnd)free.push({start:cursor,end:dayEnd});
  return free.filter(f=>f.end-f.start>=30);
}

function validateTimeSlot(){
  const time=document.getElementById('schedTime').value;
  const conflict=document.getElementById('slotConflict');
  const timeFg=document.getElementById('timeFg');
  conflict.style.display='none';timeFg.classList.remove('invalid');
  if(!time||!busyWindows.length)return true;
  const hit=isSlotBusy(time);
  if(hit){
    const selMin=timeToMin(time);
    const sorted=[...busyWindows].sort((a,b)=>a.startMin-b.startMin);
    // Find next free AFTER
    let after=hit.endMin;
    let safe=false;while(!safe&&after<=SLOT_END*60){safe=true;for(const w of sorted){if(after<w.endMin&&(after+30)>w.startMin){after=w.endMin;safe=false;break}}}
    const afterOk=after<=SLOT_END*60;
    // Find nearest free BEFORE
    let before=null;
    for(let t=selMin-30;t>=SLOT_START*60;t-=30){
      const tEnd=t+30;const blocked=sorted.some(w=>t<w.endMin&&tEnd>w.startMin);
      if(!blocked){before=t;break}
    }
    // Build suggestion
    const suggestions=[];
    if(before!==null)suggestions.push(fmtTime12(minToTime(before)));
    if(afterOk)suggestions.push(fmtTime12(minToTime(after)));
    const sugStr=suggestions.length?suggestions.map(s=>`<strong>${s}</strong>`).join(', '):'None available today';
    conflict.innerHTML=`⚠ Conflicts with <strong>${hit.uid}</strong> (${fmtTime12(hit.time)} → ${fmtTime12(minToTime(hit.endMin))}). Free slots: ${sugStr}`;
    conflict.style.display='block';timeFg.classList.add('invalid');
    return false;
  }
  return true;
}

document.addEventListener('DOMContentLoaded',async()=>{
  try{
    const r=await fetch(`${API}/api/config`);opts=(await r.json()).options;
    fillRadios(document.getElementById('srcGroup'),'source',opts.sources,true);
    fillSelect(document.getElementById('selConfig'),opts.configurations,'Config');
    fillNumSelect(document.getElementById('selFloor'),1,50,'Floor');
    fillSelect(document.getElementById('selAB'),opts.assignedByList,'Select...');
    fillSelect(document.getElementById('selAT'),opts.assignedToList,'Select...');
    await loadCities(document.getElementById('selCity'));
    const today=new Date().toISOString().split('T')[0];
    document.getElementById('schedDate').min=today;
    document.getElementById('schedDate').addEventListener('change',function(){if(this.value<today){this.value='';toast('Past dates not allowed','warn')}loadBusySlots()});
    document.getElementById('selAT').addEventListener('change',loadBusySlots);
    buildTimePicker();
    const cityEl=document.getElementById('selCity'),socEl=document.getElementById('selSoc'),locEl=document.getElementById('selLoc');
    cityEl.addEventListener('change',()=>{loadSocieties(cityEl.value,socEl,locEl);genUID()});
    socEl.addEventListener('change',()=>{loadLocalities(cityEl.value,socEl.value,locEl);loadAreas(socEl.value)});
    makeSearchable(socEl);
    document.getElementById('srcGroup').addEventListener('change',genUID);
    setupContactValidation('phone','phoneErr');
    document.getElementById('selArea').addEventListener('change',function(){
      const m=document.getElementById('areaManual');
      if(this.value==='other'){m.style.display='block';m.required=true;m.focus()}else{m.style.display='none';m.required=false;m.value=''}
    });
    // Confirm submit
    document.getElementById('confirmSubmitBtn').addEventListener('click',doSubmit);
    document.getElementById('confirmOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeConfirm()});
  }catch(e){toast('Config failed','err')}
});

async function loadAreas(soc){
  const sel=document.getElementById('selArea'),man=document.getElementById('areaManual');
  man.style.display='none';man.required=false;man.value='';sel.style.display='';
  sel.innerHTML='<option value="">Loading...</option>';
  if(!soc){sel.innerHTML='<option value="">Society first</option>';return}
  try{const r=await fetch(`${API}/api/config/areas?society=${encodeURIComponent(soc)}`);const a=await r.json();
    sel.innerHTML='<option value="">Select sqft</option>';
    a.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;sel.appendChild(o)});
    const ot=document.createElement('option');ot.value='other';ot.textContent='Other (type manually)';sel.appendChild(ot);
  }catch(e){sel.innerHTML='<option value="">Failed</option>'}}

async function genUID(){const city=document.getElementById('selCity').value;const src=getRadio('source');const box=document.getElementById('uidBox'),h=document.getElementById('fUid');
  if(!city||!src){box.textContent='Select city & source above';box.classList.add('empty');h.value='';return}
  try{const r=await fetch(`${API}/api/schedule/next-uid?city=${encodeURIComponent(city)}&source=${encodeURIComponent(src)}`);const d=await r.json();if(!r.ok)throw new Error(d.error);box.textContent=d.uid;box.classList.remove('empty');h.value=d.uid}catch(e){box.textContent='Error';box.classList.add('empty');h.value=''}}

// Step 1: validate → show confirmation popup
document.getElementById('submitBtn').addEventListener('click',async()=>{
  const uid=document.getElementById('fUid').value;
  if(!uid){toast('Select city & source to generate UID','err');return}
  const{valid,missing}=validateForm('form');if(!valid){toast(`Missing: ${missing.slice(0,3).join(', ')}`,'err');return}
  if(!document.getElementById('schedTime').value){toast('Select a time slot','err');return}
  if(!validateTimeSlot()){toast('Selected time slot is busy for this executive','err');return}
  const ph=document.getElementById('phone').value.replace(/\D/g,'');
  if(ph.length!==10){toast('Contact must be 10 digits','err');return}
  if(ph[0]==='0'){toast('Contact cannot start with 0','err');return}
  const fd=new FormData(document.getElementById('form'));const body=Object.fromEntries(fd.entries());
  body.source=getRadio('source');body.uid=uid;
  if(body.area_sqft==='other'){body.area_sqft=body.area_manual}delete body.area_manual;
  if(!body.area_sqft||parseFloat(body.area_sqft)<=0){toast('Enter valid area','err');return}
  pendingBody=body;
  // Fetch existing properties in this society
  const btn=document.getElementById('submitBtn');btn.disabled=true;btn.textContent='Checking...';
  try{
    const r=await fetch(`${API}/api/schedule/society-check?society=${encodeURIComponent(body.society_name)}`);
    const existing=await r.json();
    showConfirm(body,existing);
  }catch(e){toast('Check failed, submitting directly...','warn');doSubmit()}
  finally{btn.disabled=false;btn.textContent='Create Visit Schedule'}
});

function showConfirm(body,existing){
  document.getElementById('confirmSociety').textContent=`${body.society_name} — ${existing.length} existing propert${existing.length===1?'y':'ies'}`;
  // New property card
  document.getElementById('confirmNew').innerHTML=`<div class="ep-new-t">New Schedule</div>
    <div class="ep-new-row">
      <span><span class="epl">UID</span>${body.uid}</span>
      <span><span class="epl">Tower</span>${body.tower_no||'—'}</span>
      <span><span class="epl">Unit</span>${body.unit_no||'—'}</span>
      <span><span class="epl">Area (sqft)</span>${body.area_sqft}</span>
      <span><span class="epl">Configuration</span>${body.configuration||'—'}</span>
      <span><span class="epl">Floor</span>${body.floor||'—'}</span>
    </div>`;
  // Existing properties table
  if(existing.length){
    const rows=existing.map(p=>`<tr><td style="font-family:var(--mono);font-weight:600">${p.uid}</td><td>${p.tower_no||'—'}</td><td>${p.unit_no||'—'}</td><td>${p.area_sqft||'—'}</td><td>${p.configuration||'—'}</td><td>${p.floor||'—'}</td></tr>`).join('');
    document.getElementById('confirmExisting').innerHTML=`<div style="font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:6px">Existing Properties in ${body.society_name}</div>
      <table class="ep-table"><thead><tr><th>UID</th><th>Tower</th><th>Unit</th><th>Area</th><th>Config</th><th>Floor</th></tr></thead><tbody>${rows}</tbody></table>`;
  }else{
    document.getElementById('confirmExisting').innerHTML=`<div class="ep-empty">✓ No existing properties in this society</div>`;
  }
  document.getElementById('confirmOverlay').classList.add('open');
}

function closeConfirm(){document.getElementById('confirmOverlay').classList.remove('open');pendingBody=null}

// Step 2: actual submit
function doSubmit(){
  if(!pendingBody)return;
  const body=pendingBody;
  closeConfirm();
  submitBtn(document.getElementById('submitBtn'),async()=>{
    const r=await fetch(`${API}/api/schedule/submit`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const res=await r.json();if(!r.ok)throw new Error(res.error);
    const dt=body.schedule_date||'';const tm=body.schedule_time||'';
    const tw=body.tower_no||'';const un=body.unit_no||'';const soc=body.society_name||'';
    const ab=body.assigned_by||'';const at=body.field_exec||'';
    const dtFmt=dt?new Date(dt+'T00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'';
    const tmFmt=tm?((h,m)=>{const hr=parseInt(h);return`${hr===0?12:hr>12?hr-12:hr}:${m} ${hr>=12?'PM':'AM'}`})(...tm.split(':')):'';
    let ov=document.getElementById('tyOverlay');
    if(!ov){ov=document.createElement('div');ov.id='tyOverlay';ov.className='ty-overlay';document.body.appendChild(ov)}
    ov.innerHTML=`<div class="ty-icon">✓</div><div class="ty-title">Your visit has been scheduled for :</div>
      <div class="ty-uid">${res.uid}</div>
      <div style="margin-top:16px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px 18px;width:100%;max-width:340px">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px">
          <div style="font-size:11px;color:var(--tx3)">DATE</div><div style="font-size:11px;color:var(--tx3)">TIME</div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:14px">
          <div style="font-size:18px;font-weight:700">${dtFmt||'—'}</div><div style="font-size:18px;font-weight:700">${tmFmt||'—'}</div>
        </div>
        <div style="display:flex;gap:12px;margin-bottom:8px">
          <div style="flex:1"><div style="font-size:11px;color:var(--tx3)">TOWER</div><div style="font-size:14px;font-weight:600">${tw||'—'}</div></div>
          <div style="flex:1"><div style="font-size:11px;color:var(--tx3)">UNIT</div><div style="font-size:14px;font-weight:600">${un||'—'}</div></div>
        </div>
        <div style="margin-bottom:8px"><div style="font-size:11px;color:var(--tx3)">SOCIETY</div><div style="font-size:14px;font-weight:600">${soc||'—'}</div></div>
        <div style="border-top:1px solid var(--bd);padding-top:8px;display:flex;gap:12px">
          <div style="flex:1"><div style="font-size:11px;color:var(--tx3)">ASSIGNED BY</div><div style="font-size:13px;font-weight:600">${ab||'—'}</div></div>
          <div style="flex:1"><div style="font-size:11px;color:var(--tx3)">ASSIGNED TO</div><div style="font-size:13px;font-weight:600">${at||'—'}</div></div>
        </div>
      </div>
      <div class="ty-actions"><a href="/schedule" class="ty-back">Schedule New Visit</a><a href="/" class="ty-back">Home</a></div>`;
    ov.classList.add('show')});
}
</script>
</body></html>
