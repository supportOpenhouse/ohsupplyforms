<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>Openhouse — Property Documents for AMA</title><link rel="icon" type="image/png" href="/images/favicon.png">
<link rel="stylesheet" href="/css/styles.css">
<style>
.doc-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bd)}
.doc-row:last-child{border-bottom:none}
.doc-name{flex:1;font-size:13px;font-weight:500}
.doc-toggle{display:flex;gap:4px}
.doc-toggle button{padding:4px 14px;border:1.5px solid var(--bd);border-radius:16px;background:var(--bg);font-size:11px;font-weight:600;cursor:pointer;transition:.15s}
.doc-toggle button.active-yes{background:var(--grn);color:#fff;border-color:var(--grn)}
.doc-toggle button.active-no{background:var(--red,#b33a2e);color:#fff;border-color:var(--red,#b33a2e)}
.doc-toggle button.active-na{background:#6b7280;color:#fff;border-color:#6b7280}
.doc-upload{margin-top:6px;display:none}
.doc-upload.show{display:block}
.doc-upload-status{font-size:10px;color:var(--grn);margin-top:3px}
.upload-row{border:1.5px dashed var(--bd);border-radius:8px;padding:10px 14px;text-align:center;cursor:pointer;background:var(--bg);transition:.15s;font-size:11px;color:var(--tx3)}
.upload-row:hover{border-color:var(--ac)}
.upload-row.done{border-color:var(--grn);border-style:solid;background:#f0fdf4;color:var(--grn)}
.upload-row.missing{border-color:var(--red);background:#fef2f2;color:var(--red)}
.upload-row input[type=file]{display:none}
</style>
</head>
<body>
<header class="hdr">
  <a href="/" class="hdr-logo"><img src="/images/logo_2.png" alt="Openhouse" style="height:32px"></a>
  <div class="hdr-center"><div class="form-name">Property Documents for AMA (For Legal Team)</div></div>
  <div class="hdr-right"></div>
</header>
<div class="ctn">
  <div class="card"><div class="card-t">Load Property</div>
    <div class="load-row"><div class="fg"><label>UID</label><select id="uidSel" style="font-family:var(--mono)"></select></div>
      <button type="button" class="btn btn-dark btn-sm" id="loadBtn">Load</button></div>
    <div id="prefillStatus" class="pf-st"></div>
  </div>

  <div id="amaForm" style="display:none">
    <!-- Card 1: Property Info -->
    <div class="card">
      <div class="card-t">Property Information</div>
      <div class="r2">
        <div class="fg"><label>City</label><input type="text" id="ro_city" class="pre" readonly></div>
        <div class="fg"><label>Society Name</label><input type="text" id="ro_soc" class="pre" readonly></div>
      </div>
      <div class="r2">
        <div class="fg"><label>Unit No.</label><input type="text" id="ro_unit" class="pre" readonly></div>
        <div class="fg"><label>BD Manager</label><input type="text" id="ro_bdm" class="pre" readonly></div>
      </div>
      <div class="r2">
        <div class="fg"><label id="srcLabel">Source</label><input type="text" id="ro_srcName" class="pre" readonly></div>
        <div class="fg"><label id="srcPhLabel">Phone</label><input type="text" id="ro_srcPhone" class="pre" readonly></div>
      </div>
      <div class="fg"><label>Type of Agreement</label><input type="text" value="AMA" class="pre" readonly></div>
    </div>

    <!-- Card: Loan Details -->
    <div class="card"><div class="card-t">Loan Details</div>
      <div class="fg"><label>Any Loan? <span class="req">*</span></label>
        <div class="radios"><label><input type="radio" name="has_loan" value="Yes" id="loanYes"><span>Yes</span></label><label><input type="radio" name="has_loan" value="No" id="loanNo"><span>No</span></label></div></div>
      <div id="loanFields" style="display:none">
        <div class="r2">
          <div class="fg"><label>Applicant Name <span class="req">*</span></label><input type="text" name="loan_applicant_name" id="loanApplicant"></div>
          <div class="fg"><label>Co-applicant Name</label><input type="text" name="loan_co_applicant_name" id="loanCoApplicant"></div>
        </div>
        <div class="fg"><label>Bank Name <span class="req">*</span></label><select name="bank_name_loan" id="selBankLoan"><option value="">Select bank...</option></select>
          <input type="text" name="bank_name_loan_other" id="bankOther" style="display:none;margin-top:4px" placeholder="Specify bank name"></div>
        <div class="fg"><label>Loan A/C Number <span class="req">*</span></label><input type="text" name="loan_account_number" id="loanAc"></div>
        <div class="fg"><label>Outstanding Loan (in ₹) <span class="req">*</span></label><input type="text" inputmode="numeric" name="outstanding_loan" id="loanAmt" oninput="this.value=this.value.replace(/\D/g,'')"></div>
        <div class="fg"><label>Willing to pay loan? <span class="req">*</span></label>
          <div class="radios"><label><input type="radio" name="loan_pay_willingness" value="Yes"><span>Yes</span></label><label><input type="radio" name="loan_pay_willingness" value="No"><span>No</span></label></div></div>
      </div>
    </div>

    <!-- Card: Loan Documents -->
    <div class="card" id="loanDocsCard" style="display:none"><div class="card-t">Loan Documents</div>
      <div class="fg">
        <label>Sanction Letter</label>
        <div class="upload-row" id="up_sanction" onclick="document.getElementById('fi_sanction').click()">
          📄 Upload Sanction Letter
          <input type="file" id="fi_sanction" accept="image/*,.pdf" onchange="uploadLoanDoc(this,'sanction')">
        </div>
        <div class="doc-upload-status" id="st_sanction"></div>
      </div>
      <div class="fg">
        <label>Statement of Accounts <span class="req">*</span></label>
        <div class="upload-row" id="up_soa" onclick="document.getElementById('fi_soa').click()">
          📄 Upload Statement of Accounts
          <input type="file" id="fi_soa" accept="image/*,.pdf" onchange="uploadLoanDoc(this,'soa')">
        </div>
        <div class="doc-upload-status" id="st_soa"></div>
      </div>
      <div class="fg">
        <label>List of Documents (LOD)</label>
        <div class="upload-row" id="up_lod" onclick="document.getElementById('fi_lod').click()">
          📄 Upload LOD
          <input type="file" id="fi_lod" accept="image/*,.pdf" onchange="uploadLoanDoc(this,'lod')">
        </div>
        <div class="doc-upload-status" id="st_lod"></div>
      </div>
    </div>

    <!-- Card 2: Property Documents -->
    <div class="card">
      <div class="card-t">Property Documents</div>
      <div id="propDocsContainer"></div>
      <div class="doc-row" id="docsVerifyRow" style="display:none">
        <div class="doc-name">Documents Verification Done <span class="req">*</span></div>
        <select id="docsVerifyDd" style="padding:4px 14px;border:1.5px solid var(--bd);border-radius:16px;background:var(--bg);font-size:11px;font-weight:600;cursor:pointer;margin-left:auto;appearance:auto;max-width:140px">
          <option value="">Select...</option>
          <option value="Physically">Physically</option>
          <option value="Video Call">Video Call</option>
        </select>
      </div>
    </div>

    <button type="button" class="btn btn-dark" id="submitBtn" style="width:100%">Submit Details</button>
  </div>
</div>

<div style="position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;display:none;align-items:center;justify-content:center;padding:20px" id="successModal">
  <div style="background:var(--sf);border-radius:16px;width:100%;max-width:420px;box-shadow:0 16px 48px rgba(0,0,0,.3);text-align:center;padding:40px 30px;animation:popIn .3s ease">
    <div style="font-size:56px;margin-bottom:12px">✅</div>
    <div style="font-size:18px;font-weight:700;color:var(--tx);margin-bottom:8px">Thank you</div>
    <div style="font-size:14px;color:var(--tx3);line-height:1.6;margin-bottom:20px">Your request has been forwarded to Legal team.</div>
    <button class="btn btn-dark" onclick="document.getElementById('successModal').style.display='none'" style="padding:10px 32px;font-size:14px">OK</button>
  </div>
</div>
<style>@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}</style>

<script src="/js/shared.js"></script>
<script>
let currentUid=null,loadedData=null,cloudCfg=null;
const loanDocUrls={sanction:'',soa:'',lod:''};
const LOAN_DOC_LABEL={sanction:'Sanction Letter',soa:'Statement of Accounts',lod:'List of Documents (LOD)'};
fetch(`${API}/api/config/cloudinary`).then(r=>r.json()).then(c=>cloudCfg=c).catch(()=>{});

async function uploadLoanDoc(input,key){
  if(!input.files.length)return;if(!cloudCfg){toast('Upload not ready','warn');return}
  const file=input.files[0];if(file.size>10*1024*1024){toast('File exceeds 10MB','err');return}
  const row=document.getElementById('up_'+key);const stEl=document.getElementById('st_'+key);
  row.textContent='Uploading...';
  try{
    const fd=new FormData();fd.append('file',file);fd.append('upload_preset',cloudCfg.uploadPreset);fd.append('folder','ama-docs');
    const r=await fetch(`https://api.cloudinary.com/v1_1/${cloudCfg.cloudName}/auto/upload`,{method:'POST',body:fd});
    const d=await r.json();if(!d.secure_url)throw new Error('Upload failed');
    loanDocUrls[key]=d.secure_url;
    row.className='upload-row done';row.innerHTML=`✓ Uploaded — click to replace<input type="file" id="fi_${key}" accept="image/*,.pdf" onchange="uploadLoanDoc(this,'${key}')">`;
    stEl.innerHTML=`<a href="${d.secure_url}" target="_blank" style="color:var(--ac2);font-size:10px">View</a>`;
    toast('Uploaded','ok');
  }catch(e){toast('Upload failed','err');row.innerHTML=`📄 Upload ${LOAN_DOC_LABEL[key]}<input type="file" id="fi_${key}" accept="image/*,.pdf" onchange="uploadLoanDoc(this,'${key}')">`}
  input.value='';
}

function applyLoanVisibility(hasLoan){
  document.getElementById('loanFields').style.display=hasLoan==='Yes'?'block':'none';
  document.getElementById('loanDocsCard').style.display=hasLoan==='Yes'?'block':'none';
  document.getElementById('docsVerifyRow').style.display=hasLoan==='Yes'?'none':'flex';
}

// Property document definitions
const PROP_DOCS=[
  {key:'allotment_letter',label:'Allotment Letter'},
  {key:'possession_letter',label:'Possession Letter'},
  {key:'bba',label:'Builder Buyer Agreement'},
  {key:'conveyance_deed',label:'Conveyance Deed/Sub Lease Deed/Sale Deed'},
  {key:'parking_allotment',label:'Car Parking letter (if applicable)',optional:true},
  {key:'noc',label:'NOC (if applicable)',optional:true},
  {key:'gpa',label:'GPA (if applicable)',optional:true},
  {key:'mutation',label:'Mutation',isMutation:true}
];
let propDocState={};

function buildPropDocs(existing){
  propDocState={};
  const container=document.getElementById('propDocsContainer');
  container.innerHTML='';
  PROP_DOCS.forEach(doc=>{
    const saved=existing&&existing[doc.key];
    const url=saved?saved.url:'';

    if(doc.isMutation){
      // Mutation: map saved status back to dropdown value
      const MUTATION_MAP={'NA':'NA','Yes':'Completed','No':'Pending'};
      const ddVal=saved?MUTATION_MAP[saved.status]||'':'';
      propDocState[doc.key]={status:saved?.status||'',url:''};
      const row=document.createElement('div');
      row.innerHTML=`
        <div class="doc-row">
          <div class="doc-name">${doc.label} <span class="req">*</span></div>
          <select id="mutationDd" style="padding:4px 14px;border:1.5px solid var(--bd);border-radius:16px;background:var(--bg);font-size:11px;font-weight:600;cursor:pointer;margin-left:auto;appearance:auto;max-width:140px" onchange="onMutationDdChange(this.value)">
            <option value="">Select...</option>
            <option value="NA" ${ddVal==='NA'?'selected':''}>N/A</option>
            <option value="Completed" ${ddVal==='Completed'?'selected':''}>Completed</option>
            <option value="Pending" ${ddVal==='Pending'?'selected':''}>Pending</option>
          </select>
        </div>`;
      container.appendChild(row);
      return;
    }

    const status=saved?saved.status:(doc.optional?'':'Yes');
    propDocState[doc.key]={status,url};

    const row=document.createElement('div');
    row.innerHTML=`
      <div class="doc-row">
        <div class="doc-name">${doc.label}</div>
        <div class="doc-toggle">
          <button type="button" data-key="${doc.key}" data-val="Yes" class="${status==='Yes'?'active-yes':''}">Yes</button>
          <button type="button" data-key="${doc.key}" data-val="No" class="${status==='No'?'active-no':''}">No</button>
        </div>
      </div>
      <div class="doc-upload ${status==='No'?'show':''}" id="docUp_${doc.key}">
        <div class="upload-row ${url?'done':''}" id="docRow_${doc.key}" onclick="document.getElementById('docFi_${doc.key}').click()">
          ${url?'✓ Uploaded — click to replace':'📄 Upload document'}
          <input type="file" id="docFi_${doc.key}" accept="image/*,.pdf" onchange="uploadPropDoc(this,'${doc.key}')">
        </div>
        ${url?`<div class="doc-upload-status"><a href="${url}" target="_blank" style="color:var(--ac2);font-size:10px">View uploaded</a></div>`:''}
      </div>`;
    container.appendChild(row);
  });
  // Toggle handlers
  container.querySelectorAll('.doc-toggle button').forEach(btn=>{
    btn.addEventListener('click',function(){
      const key=this.dataset.key;const val=this.dataset.val;
      const currentStatus=propDocState[key].status;
      const docDef=PROP_DOCS.find(d=>d.key===key);
      // Optional docs can be deselected; required docs cannot
      if(currentStatus===val&&docDef&&docDef.optional&&val!=='NA'){
        propDocState[key].status='';
        this.parentElement.querySelectorAll('button').forEach(b=>{b.className=''});
        document.getElementById('docUp_'+key).classList.remove('show');
        return;
      }
      propDocState[key].status=val;
      const toggle=this.parentElement;
      toggle.querySelectorAll('button').forEach(b=>{b.className=''});
      if(val==='Yes')this.className='active-yes';
      else if(val==='No')this.className='active-no';
      else if(val==='NA')this.className='active-na';
      document.getElementById('docUp_'+key).classList.toggle('show',val==='No');
    });
  });
}

function onMutationDdChange(val){
  const STATUS_MAP={'NA':'NA','Completed':'Yes','Pending':'No'};
  propDocState.mutation.status=STATUS_MAP[val]||'';
  propDocState.mutation.url='';
}

document.addEventListener('DOMContentLoaded',async()=>{
  try{
    const cfgR=await fetch(`${API}/api/config`);const cfg=await cfgR.json();const banks=cfg?.options?.banks||[];
    const bankSel=document.getElementById('selBankLoan');
    banks.forEach(b=>{bankSel.innerHTML+=`<option value="${b}">${b}</option>`});
    bankSel.addEventListener('change',()=>{document.getElementById('bankOther').style.display=bankSel.value==='Others'?'block':'none'});
    document.querySelectorAll('input[name="has_loan"]').forEach(rb=>{
      rb.addEventListener('change',function(){
        applyLoanVisibility(this.value);
        if(this.value==='Yes'){
          if(!document.getElementById('loanApplicant').value)document.getElementById('loanApplicant').value=loadedData?.owner_broker_name||'';
          if(!document.getElementById('loanCoApplicant').value)document.getElementById('loanCoApplicant').value=loadedData?.co_owner||'';
        }
        if(this.value==='No'){
          document.getElementById('loanApplicant').value='';
          document.getElementById('loanCoApplicant').value='';
          document.getElementById('loanAc').value='';
          document.getElementById('loanAmt').value='';
          document.getElementById('selBankLoan').value='';
          document.getElementById('bankOther').style.display='none';
          document.getElementById('bankOther').value='';
          document.querySelectorAll('input[name="loan_pay_willingness"]').forEach(x=>x.checked=false);
        }
      });
    });
    const r=await fetch(`${API}/api/ama-details/uids`);const uids=await r.json();
    const sel=document.getElementById('uidSel');
    sel.innerHTML='<option value="">Select UID...</option>';
    uids.forEach(u=>{const o=document.createElement('option');o.value=u.uid;
      o.textContent=`${u.uid} — ${[u.tower_no,u.unit_no].filter(Boolean).join('-')} ${u.society_name||''}${u.ama_submitted_at?' ✓':''}`;sel.appendChild(o)});
    makeSearchable(sel);
    const p=new URLSearchParams(window.location.search);if(p.get('uid')){sel.value=p.get('uid');loadUID(p.get('uid'))}
  }catch(e){toast('Failed to load','err')}
});

document.getElementById('loadBtn').addEventListener('click',()=>{const uid=document.getElementById('uidSel').value;if(!uid){toast('Select UID','warn');return}loadUID(uid)});

async function loadUID(uid){
  const st=document.getElementById('prefillStatus');
  st.className='pf-st show';st.textContent='Loading...';
  try{
    const r=await fetch(`${API}/api/ama-details/prefill/${uid}`);if(!r.ok){const e=await r.json();throw new Error(e.error)}
    const d=await r.json();currentUid=uid;loadedData=d;

    // Card 1: Property Info
    document.getElementById('ro_city').value=d.city||'';
    document.getElementById('ro_soc').value=d.society_name||'';
    document.getElementById('ro_unit').value=[d.tower_no,d.unit_no].filter(Boolean).join('-')||'';
    document.getElementById('ro_bdm').value=d.assigned_by||'';

    // Source logic: if source contains CP/Broker → show cp_name/cp_phone, else owner
    const src=(d.source||'').toLowerCase();
    const isCP=src.includes('cp')||src.includes('broker')||src.includes('channel');
    if(isCP){
      document.getElementById('srcLabel').textContent='Broker Name';
      document.getElementById('srcPhLabel').textContent='Broker Phone';
      document.getElementById('ro_srcName').value=d.cp_name||d.owner_broker_name||'';
      document.getElementById('ro_srcPhone').value=d.cp_phone||d.contact_no||'';
    }else{
      document.getElementById('srcLabel').textContent='Seller Name';
      document.getElementById('srcPhLabel').textContent='Seller Phone';
      document.getElementById('ro_srcName').value=d.owner_broker_name||'';
      document.getElementById('ro_srcPhone').value=d.contact_no||'';
    }

    // Loan prefill
    const hasLoan=d.has_loan||((d.bank_name_loan||d.outstanding_loan||d.loan_account_number)?'Yes':'No');
    const loanRadio=document.querySelector(`input[name="has_loan"][value="${hasLoan}"]`);
    if(loanRadio)loanRadio.checked=true;
    applyLoanVisibility(hasLoan);
    document.getElementById('loanApplicant').value=d.loan_applicant_name||(hasLoan==='Yes'?(d.owner_broker_name||''):'');
    document.getElementById('loanCoApplicant').value=d.loan_co_applicant_name||(hasLoan==='Yes'?(d.co_owner||''):'');
    document.getElementById('loanAc').value=d.loan_account_number||'';
    document.getElementById('loanAmt').value=d.outstanding_loan!=null?d.outstanding_loan:'';
    const bankSel=document.getElementById('selBankLoan');
    if(d.bank_name_loan){
      let matched=false;
      for(const o of bankSel.options){if(o.value===d.bank_name_loan){matched=true;break}}
      if(matched){bankSel.value=d.bank_name_loan;document.getElementById('bankOther').style.display='none';document.getElementById('bankOther').value=''}
      else{bankSel.value='Others';document.getElementById('bankOther').style.display='block';document.getElementById('bankOther').value=d.bank_name_loan}
    }else{bankSel.value='';document.getElementById('bankOther').style.display='none';document.getElementById('bankOther').value=''}
    if(d.loan_pay_willingness){const rb=document.querySelector(`input[name="loan_pay_willingness"][value="${d.loan_pay_willingness}"]`);if(rb)rb.checked=true}
    else{document.querySelectorAll('input[name="loan_pay_willingness"]').forEach(x=>x.checked=false)}
    // Loan docs prefill
    ['sanction','soa','lod'].forEach(k=>{
      const col={sanction:'ama_sanction_url',soa:'ama_soa_url',lod:'ama_lod_url'}[k];
      loanDocUrls[k]=d[col]||'';
      const row=document.getElementById('up_'+k);const stEl=document.getElementById('st_'+k);
      if(d[col]){
        row.className='upload-row done';row.innerHTML=`✓ Uploaded — click to replace<input type="file" id="fi_${k}" accept="image/*,.pdf" onchange="uploadLoanDoc(this,'${k}')">`;
        stEl.innerHTML=`<a href="${d[col]}" target="_blank" style="color:var(--ac2);font-size:10px">View</a>`;
      }else{
        row.className='upload-row';row.innerHTML=`📄 Upload ${LOAN_DOC_LABEL[k]}<input type="file" id="fi_${k}" accept="image/*,.pdf" onchange="uploadLoanDoc(this,'${k}')">`;
        stEl.innerHTML='';
      }
    });
    if(d.docs_verification_mode)document.getElementById('docsVerifyDd').value=d.docs_verification_mode;
    else document.getElementById('docsVerifyDd').value='';

    // Card 2: Property Documents
    let existingDocs={};
    try{existingDocs=typeof d.ama_prop_docs==='string'?JSON.parse(d.ama_prop_docs):d.ama_prop_docs||{}}catch(e){}
    buildPropDocs(existingDocs);

    document.getElementById('amaForm').style.display='block';
    st.className='pf-st show ok';st.textContent=`Loaded: ${uid}${d.ama_submitted_at?' (Submitted)':''}${d.core_home_id?` · Home #${d.core_home_id}`:''}`;
  }catch(e){st.className='pf-st show err';st.textContent=e.message;document.getElementById('amaForm').style.display='none'}
}

async function uploadPropDoc(input,key){
  if(!input.files.length)return;
  if(!cloudCfg){toast('Upload not ready','warn');return}
  const file=input.files[0];if(file.size>10*1024*1024){toast('File exceeds 10MB','err');return}
  const row=document.getElementById('docRow_'+key);
  row.textContent='Uploading...';
  try{
    const fd=new FormData();fd.append('file',file);fd.append('upload_preset',cloudCfg.uploadPreset);fd.append('folder','ama-prop-docs');
    const r=await fetch(`https://api.cloudinary.com/v1_1/${cloudCfg.cloudName}/auto/upload`,{method:'POST',body:fd});
    const d=await r.json();if(!d.secure_url)throw new Error('Upload failed');
    propDocState[key].url=d.secure_url;
    row.className='upload-row done';row.innerHTML=`✓ Uploaded — click to replace<input type="file" id="docFi_${key}" accept="image/*,.pdf" onchange="uploadPropDoc(this,'${key}')" style="display:none">`;
    row.parentElement.querySelector('.doc-upload-status')?.remove();
    const st=document.createElement('div');st.className='doc-upload-status';st.innerHTML=`<a href="${d.secure_url}" target="_blank" style="color:var(--ac2);font-size:10px">View uploaded</a>`;
    row.parentElement.appendChild(st);
    toast('Uploaded','ok');
  }catch(e){toast('Upload failed','err');row.innerHTML=`📄 Upload document<input type="file" id="docFi_${key}" accept="image/*,.pdf" onchange="uploadPropDoc(this,'${key}')" style="display:none">`}
}

function getRadioVal(name){const el=document.querySelector(`input[name="${name}"]:checked`);return el?el.value:''}
document.getElementById('submitBtn').addEventListener('click',()=>{
  if(!currentUid){toast('Select a UID','warn');return}
  // Validate Any Loan? selection
  const hasLoan=getRadioVal('has_loan');
  if(!hasLoan){toast('Select Any Loan?','err');return}
  // Validate loan details when has_loan=Yes
  if(hasLoan==='Yes'){
    if(!document.getElementById('loanApplicant').value.trim()){toast('Loan Applicant Name required','err');return}
    if(!document.getElementById('selBankLoan').value){toast('Loan Bank Name required','err');return}
    if(document.getElementById('selBankLoan').value==='Others'&&!document.getElementById('bankOther').value.trim()){toast('Specify Loan Bank Name','err');return}
    if(!document.getElementById('loanAc').value.trim()){toast('Loan A/C Number required','err');return}
    if(!document.getElementById('loanAmt').value){toast('Outstanding Loan required','err');return}
    if(!getRadioVal('loan_pay_willingness')){toast('Select Willing to pay loan','err');return}
    document.getElementById('up_soa').classList.remove('missing');
    if(!loanDocUrls.soa){document.getElementById('up_soa').classList.add('missing');toast(`Upload required: ${LOAN_DOC_LABEL.soa}`,'err');return}
  }
  // Validate property documents: required docs need Yes/No, No requires mandatory upload
  const missingPropDocs=[];
  for(const doc of PROP_DOCS){
    const st=propDocState[doc.key];
    if(doc.isMutation)continue; // validated separately below
    if(!doc.optional&&!st.status){missingPropDocs.push(doc.label+' (select Yes/No)')}
    if(!doc.optional&&st.status==='No'&&!st.url){
      const row=document.getElementById('docRow_'+doc.key);if(row)row.classList.add('missing');
      missingPropDocs.push(doc.label+' (upload required)')
    }
  }
  // Mutation is required — must select from dropdown
  if(!propDocState.mutation?.status){missingPropDocs.push('Mutation (select status)')}
  // Docs verification required when no loan
  const docsVerifyVisible=document.getElementById('docsVerifyRow').style.display!=='none';
  if(docsVerifyVisible&&!document.getElementById('docsVerifyDd').value){missingPropDocs.push('Documents Verification Done (select mode)')}
  if(missingPropDocs.length){toast(`${missingPropDocs[0]}`,'err');return}
  const body={uid:currentUid};
  // When loan exists, docs verification field is hidden → send null
  body.docs_verification_mode=docsVerifyVisible?(document.getElementById('docsVerifyDd').value||null):null;
  body.ama_prop_docs=JSON.stringify(propDocState);
  // Loan payload
  body.has_loan=hasLoan;
  if(hasLoan==='Yes'){
    const bankVal=document.getElementById('selBankLoan').value;
    body.loan_applicant_name=document.getElementById('loanApplicant').value.trim()||null;
    body.loan_co_applicant_name=document.getElementById('loanCoApplicant').value.trim()||null;
    body.bank_name_loan=bankVal==='Others'?(document.getElementById('bankOther').value.trim()||'Others'):bankVal;
    body.loan_account_number=document.getElementById('loanAc').value.trim()||null;
    body.outstanding_loan=document.getElementById('loanAmt').value?parseFloat(document.getElementById('loanAmt').value):null;
    body.loan_pay_willingness=getRadioVal('loan_pay_willingness')||null;
    body.ama_sanction_url=loanDocUrls.sanction||null;
    body.ama_soa_url=loanDocUrls.soa||null;
    body.ama_lod_url=loanDocUrls.lod||null;
  }else{
    body.loan_applicant_name=null;body.loan_co_applicant_name=null;body.bank_name_loan=null;
    body.loan_account_number=null;body.outstanding_loan=null;body.loan_pay_willingness=null;
    body.ama_sanction_url=null;body.ama_soa_url=null;body.ama_lod_url=null;
  }

  submitBtn(document.getElementById('submitBtn'),async()=>{
    const r=await fetch(`${API}/api/ama-details/submit`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const res=await r.json();if(!r.ok)throw new Error(res.error);
    document.getElementById('successModal').style.display='flex';
  });
});
</script>
</body></html>
