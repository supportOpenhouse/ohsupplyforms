<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>Openhouse — My Properties</title><link rel="icon" type="image/png" href="/images/favicon.png">
<link rel="stylesheet" href="/css/styles.css">
<style>
.prop-card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.prop-card.dead{border-color:#f0c4c0;background:#fef8f8}
.prop-card.refunded{border-color:#fcd34d;background:#fefbeb}
.stage-pill.s-ama{background:#ede9fe;color:#6d28d9}
.stage-pill.s-asgn{background:#fce7f3;color:#831843}
.stage-pill.s-cp{background:#e0f2fe;color:#0369a1}
.stage-pill.s-ref{background:#fef3c7;color:#b45309}
.stats{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.stat{flex:1;min-width:70px;padding:8px 6px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);text-align:center;cursor:pointer;transition:.15s;box-shadow:var(--sh)}
.stat:hover{border-color:var(--ac)}
.stat.active{background:var(--ac);border-color:var(--ac)}
.stat.active .stat-val,.stat.active .stat-lbl{color:#fff!important}
.stat-val{font-size:20px;font-weight:700;color:var(--ac);line-height:1}
.stat-lbl{font-size:8px;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-top:3px;font-weight:600}
.prop-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;gap:8px}
.prop-hdr:active{background:var(--bg)}
.prop-uid{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--ac)}
.prop-soc{font-size:12px;color:var(--tx);font-weight:500;flex:1;margin-left:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prop-arrow{font-size:14px;color:var(--tx3);transition:transform .2s}
.prop-card.open .prop-arrow{transform:rotate(180deg)}
.prop-body{display:none;padding:0 14px 14px;border-top:1px solid var(--bd)}
.prop-card.open .prop-body{display:block}
.prop-status{display:flex;flex-wrap:wrap;gap:4px;padding:6px 14px;border-top:1px solid var(--bd)}
.ps{padding:2px 8px;border-radius:12px;font-size:9px;font-weight:600}
.ps.done{background:#e8f2ec;color:#2d5a3d}
.ps.pending{background:#f3f4f6;color:#999}
.ps.draft{background:#fef3c7;color:#92400e}
.ps.dead{background:#fdecea;color:#b33a2e}
.vbadge{padding:2px 8px;border-radius:12px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
.vbadge.done{background:#e8f2ec;color:#2d5a3d}
.vbadge.pending{background:#fff3d6;color:#b45309}
.vbadge.overdue{background:#fdecea;color:#b33a2e}
.visit-line{display:flex;align-items:center;gap:6px;padding:6px 14px 0;font-size:11px;color:var(--tx3);flex-wrap:wrap}
.visit-line .vl-date{font-weight:600;color:var(--tx)}
.pd-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:8px}
.pd-grid.col3{grid-template-columns:1fr 1fr 1fr}
.pd-item{background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:5px 8px}
.pd-item.full{grid-column:1/-1}
.pd-label{font-size:8px;letter-spacing:.06em;text-transform:uppercase;color:var(--tx3);font-weight:500}
.pd-value{font-size:11px;font-weight:500;color:var(--tx);margin-top:1px}
.pd-value.empty{color:#bbb;font-style:italic;font-weight:300}
.update-wrap{margin-top:10px;padding-top:10px;border-top:1px dashed var(--bd);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.update-wrap label{font-size:11px;font-weight:600;color:var(--tx3);white-space:nowrap}
.update-wrap select{font-size:13px;flex:1;min-width:140px}
.update-wrap input{font-size:13px;flex:1;min-width:100px}
.update-wrap .uw-row{display:flex;align-items:center;gap:6px;width:100%;flex-wrap:wrap}
.update-wrap .uw-btns{display:flex;gap:6px;width:100%;margin-top:4px}
.update-wrap button{white-space:nowrap}
.prop-count{font-size:11px;color:var(--tx3);margin-bottom:10px}
.stage-pill{display:inline-block;padding:2px 8px;border-radius:12px;font-size:9px;font-weight:600;white-space:nowrap;margin-left:6px}
.stage-pill.s-sch{background:#dbeafe;color:#1e40af}
.stage-pill.s-vis{background:#e0e7ff;color:#3730a3}
.stage-pill.s-tok{background:#fef3c7;color:#92400e}
.stage-pill.s-deal{background:#fce7f3;color:#9d174d}
.stage-pill.s-fin{background:#d1fae5;color:#065f46}
.stage-pill.s-lst{background:#e8f2ec;color:#2d5a3d}
.stage-pill.s-can{background:#fdecea;color:#b33a2e}
.prog-bar{height:3px;background:var(--bd);border-radius:2px;overflow:hidden;margin:0 14px}
.prog-fill{height:100%;border-radius:2px;transition:width .3s}
.filter-row{display:flex;gap:6px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
</style>
</head>
<body>
<header class="hdr">
  <a href="/" class="hdr-logo"><img src="/images/logo_2.png" alt="Openhouse" style="height:32px"></a>
  <div class="hdr-center"><div class="form-name">My Properties</div></div>
  <div class="hdr-right"></div>
</header>
<div class="ctn">
  <div class="stats" id="stats">
    <div class="stat" data-filter="" id="stAll"><div class="stat-val" id="sAll">—</div><div class="stat-lbl">Total</div></div>
    <div class="stat" data-filter="scheduled"><div class="stat-val" id="sSch">—</div><div class="stat-lbl">Scheduled</div></div>
    <div class="stat" data-filter="visited"><div class="stat-val" id="sVis">—</div><div class="stat-lbl">Visited</div></div>
    <div class="stat" data-filter="token"><div class="stat-val" id="sTok">—</div><div class="stat-lbl">Token Req</div></div>
    <div class="stat" data-filter="deal"><div class="stat-val" id="sDeal">—</div><div class="stat-lbl">Deal Terms</div></div>
    <div class="stat" data-filter="ama"><div class="stat-val" id="sAma">—</div><div class="stat-lbl">AMA Req</div></div>
    <div class="stat" data-filter="amasigned"><div class="stat-val" id="sAmaSgn">—</div><div class="stat-lbl">AMA Signed</div></div>
    <div class="stat" data-filter="listed"><div class="stat-val" id="sLst">—</div><div class="stat-lbl">Listed</div></div>
    <div class="stat" data-filter="cpbill"><div class="stat-val" id="sCp">—</div><div class="stat-lbl">CP Bill</div></div>
    <div class="stat" data-filter="final"><div class="stat-val" id="sFin">—</div><div class="stat-lbl">Key Handover</div></div>
    <div class="stat" data-filter="refunded"><div class="stat-val" id="sRef" style="color:#b45309">—</div><div class="stat-lbl">Cancelled PT</div></div>
    <div class="stat" data-filter="dead"><div class="stat-val" id="sCan" style="color:var(--red)">—</div><div class="stat-lbl">Cancelled</div></div>
  </div>
  <div class="filter-row">
    <input type="text" id="fQ" placeholder="🔍 Search UID, society, owner..." style="font-size:16px;flex:2;min-width:180px;padding:8px 12px;border:1px solid var(--bd);border-radius:var(--r)">
    <select id="fStatus" style="font-size:14px;flex:1;min-width:120px;padding:8px 10px;border:1px solid var(--bd);border-radius:var(--r)">
      <option value="">All Stages</option>
      <option value="scheduled">Scheduled</option>
      <option value="visited">Visited</option>
      <option value="token">Token Req</option>
      <option value="deal">Deal Terms</option>
      <option value="ama">AMA Req</option>
      <option value="amasigned">AMA Signed</option>
      <option value="listed">Listed</option>
      <option value="cpbill">CP Bill</option>
      <option value="final">Key Handover</option>
      <option value="refunded">Cancelled Post Token</option>
      <option value="dead">Cancelled</option>
    </select>
  </div>
  <div class="prop-count" id="propCount">Loading...</div>
  <div id="propList"></div>
</div>
<script src="/js/shared.js"></script>
<script>
let allProps=[],assignedToList=[];

function fmtDt(d){if(!d)return'—';const dt=new Date(d);return dt.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}
function fmtTime12(t){if(!t)return'—';const[h,m]=t.split(':');const hr=parseInt(h);return`${hr===0?12:hr>12?hr-12:hr}:${m} ${hr>=12?'PM':'AM'}`}

// Local "today" as YYYY-MM-DD for day-level comparison against the scheduled visit date.
function todayStr(){const t=new Date();return`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`}
// Visit status for the scheduled visit: Done once visited, else Overdue if the date has passed, else Pending.
function visitStatus(p){
  if(p.is_dead)return null;
  if(p.visit_submitted_at)return{label:'Done',cls:'done'};
  const sd=(p.schedule_date||'').split('T')[0];
  if(!sd)return{label:'Pending',cls:'pending'};
  return sd<todayStr()?{label:'Overdue',cls:'overdue'}:{label:'Pending',cls:'pending'};
}
// Sort by scheduled visit date, latest on top (properties without a date go last).
function bySchedDesc(a,b){
  const da=(a.schedule_date||'').split('T')[0],db=(b.schedule_date||'').split('T')[0];
  if(da===db)return 0;if(!da)return 1;if(!db)return -1;return da<db?1:-1;
}

function getStage(p){
  if(p.is_dead)return{label:'Cancelled',cls:'s-can',key:'dead',step:0};
  if(p.is_token_refunded)return{label:'Cancelled Post Token',cls:'s-ref',key:'refunded',step:0};
  if(p.final_submitted_at)return{label:'Key Handover',cls:'s-fin',key:'final',step:9};
  if(p.cp_bill_submitted_at)return{label:'CP Bill',cls:'s-cp',key:'cpbill',step:8};
  if(p.listing_submitted_at)return{label:'Listed',cls:'s-lst',key:'listed',step:7};
  if(p.pending_request_submitted_at)return{label:'AMA Signed',cls:'s-asgn',key:'amasigned',step:6};
  if(p.ama_submitted_at)return{label:'AMA Req',cls:'s-ama',key:'ama',step:5};
  if(p.token_deal_submitted_at)return{label:'Deal Terms',cls:'s-deal',key:'deal',step:4};
  if(p.token_submitted_at||p.token_is_draft)return{label:p.token_is_draft?'Token (Draft)':'Token Req',cls:'s-tok',key:'token',step:3};
  if(p.visit_submitted_at)return{label:'Visited',cls:'s-vis',key:'visited',step:2};
  if(p.schedule_submitted_at)return{label:'Scheduled',cls:'s-sch',key:'scheduled',step:1};
  return{label:'—',cls:'',key:'',step:0};
}

const PROG_COLORS={1:'#3b82f6',2:'#6366f1',3:'#f59e0b',4:'#ec4899',5:'#8b5cf6',6:'#831843',7:'#0369a1',8:'#10b981',9:'#2d5a3d',0:'#b33a2e'};

function pdv(label,val){
  const isEmpty=val===null||val===undefined||val===''||val==='null';
  return`<div class="pd-item"><div class="pd-label">${label}</div><div class="pd-value${isEmpty?' empty':''}">${isEmpty?'—':val}</div></div>`;
}

let activeStatFilter='';
function updateStatCounts(){
  document.getElementById('sAll').textContent=allProps.length;
  document.getElementById('sSch').textContent=allProps.filter(p=>p._stage.key==='scheduled').length;
  document.getElementById('sVis').textContent=allProps.filter(p=>p._stage.key==='visited').length;
  document.getElementById('sTok').textContent=allProps.filter(p=>p._stage.key==='token').length;
  document.getElementById('sDeal').textContent=allProps.filter(p=>p._stage.key==='deal').length;
  document.getElementById('sAma').textContent=allProps.filter(p=>p._stage.key==='ama').length;
  document.getElementById('sAmaSgn').textContent=allProps.filter(p=>p._stage.key==='amasigned').length;
  document.getElementById('sCp').textContent=allProps.filter(p=>p._stage.key==='cpbill').length;
  document.getElementById('sFin').textContent=allProps.filter(p=>p._stage.key==='final').length;
  document.getElementById('sLst').textContent=allProps.filter(p=>p._stage.key==='listed').length;
  document.getElementById('sRef').textContent=allProps.filter(p=>p._stage.key==='refunded').length;
  document.getElementById('sCan').textContent=allProps.filter(p=>p._stage.key==='dead').length;
}

function renderProps(){
  const q=document.getElementById('fQ').value.toLowerCase();
  const st=document.getElementById('fStatus').value||activeStatFilter;
  let d=allProps;
  if(q)d=d.filter(p=>(p.uid||'').toLowerCase().includes(q)||(p.society_name||'').toLowerCase().includes(q)||(p.owner_broker_name||'').toLowerCase().includes(q));
  if(st)d=d.filter(p=>p._stage.key===st);
  d=[...d].sort(bySchedDesc);
  document.getElementById('propCount').textContent=`${d.length} propert${d.length===1?'y':'ies'}`;
  const list=document.getElementById('propList');
  if(!d.length){list.innerHTML='<div style="text-align:center;padding:40px;color:var(--tx3)">No properties found</div>';return}

  const atOpts=assignedToList.map(n=>`<option value="${n}">${n}</option>`).join('');

  list.innerHTML=d.map((p,idx)=>{
    const dead=p.is_dead;const refunded=p.is_token_refunded;
    const stage=p._stage;
    const progPct=(dead||refunded)?100:Math.round(stage.step/9*100);
    const progColor=PROG_COLORS[stage.step]||'#ccc';

    const steps=[
      {n:'Schedule',ok:!!p.schedule_submitted_at},
      {n:'Visit',ok:!!p.visit_submitted_at},
      {n:'Token',ok:!!p.token_submitted_at,draft:p.token_is_draft},
      {n:'Deal Terms',ok:!!p.token_deal_submitted_at},
      {n:'AMA Req',ok:!!p.ama_submitted_at},
      {n:'AMA Signed',ok:!!p.pending_request_submitted_at},
      {n:'Listing',ok:!!p.listing_submitted_at},
      {n:'CP Bill',ok:!!p.cp_bill_submitted_at},
      {n:'Key Handover',ok:!!p.final_submitted_at}
    ];
    const statusHtml=dead?'<span class="ps dead">Cancelled</span>':refunded?'<span class="ps" style="background:#fef3c7;color:#b45309">Cancelled Post Token</span>':steps.map(s=>{
      const cls=s.draft?'draft':s.ok?'done':'pending';
      return`<span class="ps ${cls}">${s.n} ${s.draft?'◐':s.ok?'✓':'✗'}</span>`;
    }).join('');

    const unit=[p.tower_no,p.unit_no].filter(Boolean).join('-');
    const subtitle=[unit,p.society_name].filter(Boolean).join(' | ');

    const vstat=visitStatus(p);
    const visitLine=p.schedule_date?`<div class="visit-line">🗓 <span>Visit Scheduled:</span> <span class="vl-date">${fmtDt(p.schedule_date)}${p.schedule_time?' · '+fmtTime12(p.schedule_time):''}</span>${vstat?` <span class="vbadge ${vstat.cls}">${vstat.label}</span>`:''}</div>`:'';

    const detailHtml=`
      <div class="pd-grid">
        ${pdv('UID',p.uid)}${pdv('Source',p.source)}
        ${pdv('Society',p.society_name)}${pdv('Locality',p.locality)}
        ${pdv('Owner/Broker',p.owner_broker_name)}${pdv('Phone',p.contact_no)}
        ${pdv('Unit No',p.unit_no)}${pdv('Tower No',p.tower_no)}
        ${pdv('Floor',p.floor)}${pdv('Area (sqft)',p.area_sqft)}
        ${pdv('Configuration',p.configuration)}${pdv('Ask (Lakhs)',p.demand_price)}
        ${pdv('Schedule Date',fmtDt(p.schedule_date))}${pdv('Schedule Time',fmtTime12(p.schedule_time))}
        ${pdv('Assigned By',p.assigned_by)}${pdv('Assigned To',p.field_exec)}
      </div>
      ${!dead&&p.schedule_submitted_at&&!p.visit_submitted_at?`<div class="update-wrap">
        <div class="uw-row">
          <label>Re-assign To:</label>
          <select id="ra_${idx}"><option value="">Select...</option>${atOpts}</select>
        </div>
        <div class="uw-row">
          <label>Reschedule:</label>
          <input type="date" id="rd_${idx}" value="${p.schedule_date?p.schedule_date.split('T')[0]:''}" min="${new Date().toISOString().split('T')[0]}">
          <input type="time" id="rt_${idx}" value="${p.schedule_time||''}">
        </div>
        <div class="uw-btns">
          <button class="btn btn-out btn-sm" onclick="updateProp('${p.uid}',${idx})">Update</button>
        </div>
      </div>`:''}`;

    return`<div class="prop-card${dead?' dead':refunded?' refunded':''}" id="pc_${idx}">
      <div class="prop-hdr" onclick="toggleCard(${idx})">
        <span class="prop-uid">${p.uid}</span>
        <span class="stage-pill ${stage.cls}">${stage.label}</span>
        <span class="prop-soc">${subtitle}</span>
        <span class="prop-arrow">▼</span>
      </div>
      ${visitLine}
      <div class="prog-bar"><div class="prog-fill" style="width:${progPct}%;background:${progColor}"></div></div>
      <div class="prop-status">${statusHtml}</div>
      <div class="prop-body">${detailHtml}</div>
    </div>`;
  }).join('');
}

function toggleCard(idx){document.getElementById('pc_'+idx).classList.toggle('open')}

async function updateProp(uid,idx){
  const newExec=document.getElementById('ra_'+idx).value;
  const newDate=document.getElementById('rd_'+idx).value;
  const newTime=document.getElementById('rt_'+idx).value;
  if(!newExec&&!newDate&&!newTime){toast('Change at least one field','warn');return}
  if(newDate){
    const today=new Date().toISOString().split('T')[0];
    if(newDate<today){toast('Cannot schedule in the past','err');return}
  }
  const parts=[];
  if(newExec)parts.push(`Re-assign to ${newExec}`);
  if(newDate||newTime){
    const dtFmt=newDate?new Date(newDate+'T00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'(same)';
    let tmFmt='(same)';
    if(newTime){const[h,m]=newTime.split(':');const hr=parseInt(h);tmFmt=`${hr===0?12:hr>12?hr-12:hr}:${m} ${hr>=12?'PM':'AM'}`}
    parts.push(`Reschedule to ${dtFmt} at ${tmFmt}`);
  }
  if(!confirm(`${uid}:\n${parts.join('\n')}\n\nProceed?`))return;
  const body={};
  if(newExec)body.field_exec=newExec;
  if(newDate)body.schedule_date=newDate;
  if(newTime)body.schedule_time=newTime;
  try{
    const r=await fetch(`${API}/api/visit/update/${uid}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const d=await r.json();if(!r.ok)throw new Error(d.error);
    toast('Updated successfully','ok');
    const p=allProps.find(x=>x.uid===uid);
    if(p){
      if(newExec)p.field_exec=newExec;
      if(newDate)p.schedule_date=newDate;
      if(newTime)p.schedule_time=newTime;
    }
    renderProps();
    // Fire WhatsApp notification only if rescheduled without reassign (reassign already notifies via backend)
    if(!newExec&&(newDate||newTime))fetch(`${API}/api/visit/notify/${uid}`,{method:'POST'}).catch(()=>{});
  }catch(e){toast(e.message||'Failed','err')}
}

document.addEventListener('DOMContentLoaded',async()=>{
  try{
    const[cr,pr]=await Promise.all([fetch(`${API}/api/config`),fetch(`${API}/api/my-properties`)]);
    const opts=(await cr.json()).options;
    assignedToList=[...opts.assignedToList].sort();
    allProps=await pr.json();
    allProps.forEach(p=>p._stage=getStage(p));
    updateStatCounts();
    renderProps();
  }catch(e){toast('Failed to load','err');document.getElementById('propCount').textContent='Failed to load'}
});
document.getElementById('fQ').addEventListener('input',renderProps);
document.getElementById('fStatus').addEventListener('change',()=>{activeStatFilter='';document.querySelectorAll('.stat').forEach(s=>s.classList.remove('active'));renderProps()});
document.querySelectorAll('.stat').forEach(s=>s.addEventListener('click',()=>{
  const f=s.dataset.filter;
  if(activeStatFilter===f){activeStatFilter='';s.classList.remove('active')}
  else{document.querySelectorAll('.stat').forEach(x=>x.classList.remove('active'));activeStatFilter=f;if(f)s.classList.add('active')}
  document.getElementById('fStatus').value='';renderProps();
}));
</script>
</body></html>
