<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>Openhouse — AMA Acknowledgement & Pending Amount Request (For Owner & Internal Team)</title><link rel="icon" type="image/png" href="/images/favicon.png">
<link rel="stylesheet" href="/css/styles.css">
<style>
.email-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.email-overlay.open{display:flex}
.email-box{background:var(--sf);border-radius:12px;width:100%;max-width:640px;margin:40px auto;box-shadow:0 12px 40px rgba(0,0,0,.25);overflow:hidden}
.email-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--bd);background:var(--bg)}
.email-body{padding:16px;max-height:60vh;overflow-y:auto}
.email-ftr{padding:12px 16px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end}
.pu-item{border:2px dashed var(--bd);border-radius:8px;padding:12px;text-align:center;cursor:pointer;transition:.15s;background:var(--bg);position:relative;min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.pu-item:hover{border-color:var(--ac);background:rgba(0,0,0,.01)}
.pu-item.uploaded{border-color:var(--grn);border-style:solid;background:#f0fdf4}
.pu-item .pu-icon{font-size:20px;color:var(--tx3)}
.pu-item.uploaded .pu-icon{color:var(--grn)}
.pu-item .pu-label{font-size:10px;color:var(--tx3);font-weight:500}
.pu-item.uploaded .pu-label{color:var(--grn)}
.pu-item .pu-link{font-size:9px;color:var(--ac2);text-decoration:underline;margin-top:2px}
.pu-item.missing{border-color:var(--red);background:#fef2f2}
.pu-item.missing .pu-icon{color:var(--red)}
.pu-item.missing .pu-label{color:var(--red)}
.upload-row{border:1.5px dashed var(--bd);border-radius:8px;padding:10px 14px;text-align:center;cursor:pointer;background:var(--bg);transition:.15s;font-size:11px;color:var(--tx3)}
.upload-row:hover{border-color:var(--ac)}
.upload-row.done{border-color:var(--grn);border-style:solid;background:#f0fdf4;color:var(--grn)}
.upload-row.missing{border-color:var(--red);background:#fef2f2;color:var(--red)}
.upload-row input[type=file]{display:none}
</style></head>
<body>
<header class="hdr">
  <a href="/" class="hdr-logo"><img src="/images/logo_2.png" alt="Openhouse" style="height:32px"></a>
  <div class="hdr-center"><div class="form-name">AMA Acknowledgement & Pending Amount Request (For Owner & Internal Team)</div></div>
  <div class="hdr-right"></div>
</header>
<div class="ctn">
  <div class="card"><div class="card-t">Load Property</div>
    <div class="load-row"><div class="fg"><label>UID</label><select id="selUid" style="font-family:var(--mono)"></select></div>
      <button type="button" class="btn btn-dark btn-sm" id="loadBtn">Load</button></div>
    <div class="pf-st" id="pfSt"></div></div>

  <div id="parForm" style="display:none">
    <div class="card"><div class="card-t">Property Details</div>
      <div class="r2">
        <div class="fg"><label>Society</label><input type="text" id="ro_soc" class="pre" readonly></div>
        <div class="fg"><label>Unit / Tower</label><input type="text" id="ro_unit" class="pre" readonly></div>
      </div>
      <div class="r2">
        <div class="fg"><label>Owner</label><input type="text" id="ro_owner" class="pre" readonly></div>
        <div class="fg"><label>Co-owner</label><input type="text" id="ro_coowner" class="pre" readonly></div>
      </div>
    </div>

    <div class="card"><div class="card-t">Amount Summary</div>
      <div class="r3">
        <div class="fg"><label>Total Deposit</label><input type="text" id="ro_totalDeposit" class="pre" readonly></div>
        <div class="fg"><label>Token Paid</label><input type="text" id="ro_tokenPaid" class="pre" readonly></div>
        <div class="fg"><label>Remaining</label><input type="text" id="ro_remaining" class="pre" readonly style="font-weight:700;color:var(--ac)"></div>
      </div>
    </div>

    <div class="card"><div class="card-t">AMA Details</div>
      <div class="fg"><label>Date of AMA <span class="req">*</span></label><input type="date" name="ama_date" id="amaDate" required><div class="err-msg">Required</div></div>
    </div>

    <div class="card"><div class="card-t">Payment Split</div>
      <div class="r2" id="amountFields">
        <div class="fg"><label id="owner1Label">Owner Amount (₹) <span class="req">*</span></label><input type="text" inputmode="numeric" id="owner1Amt" oninput="this.value=this.value.replace(/\D/g,'')" required></div>
        <div class="fg" id="owner2Wrap" style="display:none"><label id="owner2Label">Co-owner Amount (₹) <span class="req">*</span></label><input type="text" inputmode="numeric" id="owner2Amt" oninput="this.value=this.value.replace(/\D/g,'')"></div>
      </div>
    </div>

    <div class="card" id="coOwnerKycCard" style="display:none">
      <div class="card-t">Co-owner KYC & Bank Details</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px">
        <div class="pu-item" id="pu_coAadhaarFront" onclick="document.getElementById('fi_co_aadhaar_front').click()">
          <div class="pu-icon">📄</div><div class="pu-label">Aadhaar Card Front <span class="req">*</span></div>
          <input type="file" id="fi_co_aadhaar_front" accept="image/*,.pdf" style="display:none" onchange="uploadCoDoc(this,'co_aadhaar_front')">
        </div>
        <div class="pu-item" id="pu_coAadhaarBack" onclick="document.getElementById('fi_co_aadhaar_back').click()">
          <div class="pu-icon">📄</div><div class="pu-label">Aadhaar Card Back <span class="req">*</span></div>
          <input type="file" id="fi_co_aadhaar_back" accept="image/*,.pdf" style="display:none" onchange="uploadCoDoc(this,'co_aadhaar_back')">
        </div>
        <div class="pu-item" id="pu_coPan" onclick="document.getElementById('fi_co_pan').click()">
          <div class="pu-icon">📄</div><div class="pu-label">PAN Card <span class="req">*</span></div>
          <input type="file" id="fi_co_pan" accept="image/*,.pdf" style="display:none" onchange="uploadCoDoc(this,'co_pan')">
        </div>
        <div class="pu-item" id="pu_coCheque" onclick="document.getElementById('fi_co_cheque').click()">
          <div class="pu-icon">📄</div><div class="pu-label">Cancelled Cheque <span class="req">*</span></div>
          <input type="file" id="fi_co_cheque" accept="image/*,.pdf" style="display:none" onchange="uploadCoDoc(this,'co_cheque')">
        </div>
      </div>
    </div>

    <button type="button" class="btn btn-dark" id="submitBtn" style="width:100%">Submit</button>
    <button type="button" class="btn btn-out" id="emailBtn" style="width:100%;margin-top:8px;display:none;color:var(--ac2);border-color:var(--ac2)">📧 Preview Mail</button>
  </div>
</div>

<div class="email-overlay" id="emailModal">
  <div class="email-box">
    <div class="email-hdr"><h3 style="font-size:14px;margin:0">Email Preview</h3><button class="btn btn-out btn-sm" onclick="closeEmailModal()">✕</button></div>
    <div class="email-body" id="emailPreviewBody"></div>
    <div class="email-ftr">
      <button class="btn btn-out btn-sm" onclick="closeEmailModal()">Cancel</button>
      <button class="btn btn-dark btn-sm" id="confirmSendBtn">✉ Confirm & Send</button>
    </div>
  </div>
</div>

<script src="/js/shared.js"></script>
<script>
let currentUid=null,propData=null,isAdmin=false,isManager=false;
let cloudCfg=null;
const coDocUrls={co_aadhaar_front:'',co_aadhaar_back:'',co_pan:'',co_cheque:''};
const CO_DOC_ITEM={co_aadhaar_front:'pu_coAadhaarFront',co_aadhaar_back:'pu_coAadhaarBack',co_pan:'pu_coPan',co_cheque:'pu_coCheque'};
const CO_DOC_COL={co_aadhaar_front:'co_owner_aadhaar_front_url',co_aadhaar_back:'co_owner_aadhaar_back_url',co_pan:'co_owner_pan_url',co_cheque:'co_owner_cheque_url'};
const CO_DOC_LABEL={co_aadhaar_front:'Aadhaar Front',co_aadhaar_back:'Aadhaar Back',co_pan:'PAN Card',co_cheque:'Cancelled Cheque'};
fetch(`${API}/api/config/cloudinary`).then(r=>r.json()).then(c=>cloudCfg=c).catch(()=>{});

async function uploadCoDoc(input,key){
  if(!input.files.length)return;if(!cloudCfg){toast('Upload not ready','warn');return}
  const file=input.files[0];if(file.size>10*1024*1024){toast('File exceeds 10MB','err');return}
  const item=document.getElementById(CO_DOC_ITEM[key]);item.querySelector('.pu-label').textContent='Uploading...';
  try{
    const coName=(propData?.co_owner||'co-owner').replace(/[^a-zA-Z0-9 ]/g,'').replace(/\s+/g,'_');
    const fd=new FormData();fd.append('file',file);fd.append('upload_preset',cloudCfg.uploadPreset);fd.append('folder',`co-owner-docs/${coName}`);
    const r=await fetch(`https://api.cloudinary.com/v1_1/${cloudCfg.cloudName}/auto/upload`,{method:'POST',body:fd});
    const d=await r.json();if(!d.secure_url)throw new Error('Upload failed');
    coDocUrls[key]=d.secure_url;item.classList.add('uploaded');item.classList.remove('missing');
    item.querySelector('.pu-label').innerHTML=CO_DOC_LABEL[key]+' ✓ <span class="req">*</span>';
    let link=item.querySelector('.pu-link');if(!link){link=document.createElement('a');link.className='pu-link';link.target='_blank';link.textContent='View';link.onclick=e=>e.stopPropagation();item.appendChild(link)}
    link.href=d.secure_url;toast('Uploaded','ok');
  }catch(e){toast('Upload failed','err');item.querySelector('.pu-label').innerHTML=CO_DOC_LABEL[key]+' <span class="req">*</span>'}
  input.value='';
}

document.addEventListener('DOMContentLoaded',async()=>{
  try{
    const me=await fetch('/auth/me').then(r=>r.json());
    isAdmin=me.is_admin;isManager=me.is_manager;
    const r=await fetch(`${API}/api/pending-request/uids`);const uids=await r.json();
    const sel=document.getElementById('selUid');
    sel.innerHTML='<option value="">Select UID...</option>';
    uids.forEach(u=>{const o=document.createElement('option');o.value=u.uid;
      o.textContent=`${u.uid} — ${[u.tower_no,u.unit_no].filter(Boolean).join('-')} ${u.society_name||''}${u.pending_request_submitted_at?' ✓':''}`;sel.appendChild(o)});
    makeSearchable(sel);
    const p=new URLSearchParams(window.location.search);if(p.get('uid')){sel.value=p.get('uid');loadData()}
  }catch(e){toast('Failed to load','err')}
});

document.getElementById('loadBtn').addEventListener('click',loadData);

async function loadData(){
  const uid=document.getElementById('selUid').value;if(!uid){toast('Select UID','warn');return}
  const st=document.getElementById('pfSt');st.className='pf-st show';st.textContent='Loading...';
  try{
    const r=await fetch(`${API}/api/pending-request/prefill/${uid}`);if(!r.ok){const e=await r.json();throw new Error(e.error)}
    propData=await r.json();currentUid=uid;

    document.getElementById('ro_soc').value=propData.society_name||'';
    document.getElementById('ro_unit').value=[propData.tower_no,propData.unit_no].filter(Boolean).join('-')||'';
    document.getElementById('ro_owner').value=propData.owner_broker_name||'';
    document.getElementById('ro_coowner').value=propData.co_owner||'—';

    const td=Number(propData.total_deposit)||0;
    const tk=Number(propData.deal_token_amount)||0;
    const rem=td-tk;
    document.getElementById('ro_totalDeposit').value=td?'₹ '+td.toLocaleString('en-IN'):'—';
    document.getElementById('ro_tokenPaid').value=tk?'₹ '+tk.toLocaleString('en-IN'):'—';
    document.getElementById('ro_remaining').value=rem>0?'₹ '+rem.toLocaleString('en-IN'):'₹ 0';

    // AMA date prefill
    if(propData.ama_date)document.getElementById('amaDate').value=propData.ama_date.split('T')[0];

    // Payment amounts — editable
    const hasCoOwner=!!(propData.co_owner&&propData.co_owner.trim());
    document.getElementById('owner1Label').textContent=(propData.owner_broker_name||'Owner')+' Amount (₹)';
    if(hasCoOwner){
      document.getElementById('owner2Wrap').style.display='block';
      document.getElementById('owner2Label').textContent=(propData.co_owner||'Co-owner')+' Amount (₹)';
      const half=Math.round(td/2);
      document.getElementById('owner1Amt').value=half-tk>0?half-tk:0;
      document.getElementById('owner2Amt').value=half;
      // Show co-owner KYC card
      document.getElementById('coOwnerKycCard').style.display='block';
      for(const[key,col]of Object.entries(CO_DOC_COL)){
        coDocUrls[key]=propData[col]||'';
        const item=document.getElementById(CO_DOC_ITEM[key]);
        if(propData[col]){item.classList.add('uploaded');item.querySelector('.pu-label').innerHTML=CO_DOC_LABEL[key]+' ✓ <span class="req">*</span>';
          let link=item.querySelector('.pu-link');if(!link){link=document.createElement('a');link.className='pu-link';link.target='_blank';link.textContent='View';link.onclick=e=>e.stopPropagation();item.appendChild(link)}
          link.href=propData[col]}
      }
    }else{
      document.getElementById('owner2Wrap').style.display='none';
      document.getElementById('owner1Amt').value=rem>0?rem:0;
      document.getElementById('coOwnerKycCard').style.display='none';
    }

    document.getElementById('parForm').style.display='block';
    document.getElementById('emailBtn').style.display=propData.pending_request_submitted_at?'block':'none';
    if(propData.pending_request_email_sent===true){const eb=document.getElementById('emailBtn');eb.disabled=true;eb.innerHTML='✓ Email Sent Already';eb.style.borderColor='var(--grn)';eb.style.color='var(--grn)'}
    st.className='pf-st show ok';st.textContent=`Loaded: ${uid}${propData.pending_request_submitted_at?' (Submitted)':''}`;
  }catch(e){st.className='pf-st show err';st.textContent=e.message;document.getElementById('parForm').style.display='none'}
}

// Submit
document.getElementById('submitBtn').addEventListener('click',()=>{
  if(!currentUid){toast('Select a UID','warn');return}
  const amaDate=document.getElementById('amaDate').value;
  if(!amaDate){toast('AMA Date required','err');return}
  const alreadySubmitted=!!(propData&&propData.pending_request_submitted_at);
  if(!document.getElementById('owner1Amt').value){toast('Owner amount required','err');return}
  // Validate co-owner docs if card is visible
  const coKycVisible=document.getElementById('coOwnerKycCard').style.display!=='none';
  if(coKycVisible&&!alreadySubmitted){
    const missing=[];
    Object.values(CO_DOC_ITEM).forEach(id=>document.getElementById(id).classList.remove('missing'));
    for(const[key,label]of Object.entries(CO_DOC_LABEL)){
      if(!coDocUrls[key]){missing.push(label);document.getElementById(CO_DOC_ITEM[key]).classList.add('missing')}
    }
    if(missing.length){toast(`Upload required: ${missing.join(', ')}`,'err');return}
  }

  const body={uid:currentUid,ama_date:amaDate};
  for(const[key,col]of Object.entries(CO_DOC_COL)){body[col]=coDocUrls[key]||null}
  submitBtn(document.getElementById('submitBtn'),async()=>{
    const r=await fetch(`${API}/api/pending-request/submit`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const res=await r.json();if(!r.ok)throw new Error(res.error);
    document.getElementById('emailBtn').style.display='block';
    toast('Submitted!','ok');
  });
});

// Send email — show preview first
document.getElementById('emailBtn').addEventListener('click',()=>{
  if(!currentUid){toast('Load a property first','warn');return}
  if(!propData?.owner_email){toast('Owner email not found. Set it in Deal Terms form.','err');return}
  if(!propData?.signed_ama_url){toast('AMA is not yet uploaded by the Legal Team.','err');return}
  const addr=[propData?.unit_no,propData?.tower_no,propData?.society_name,propData?.locality,propData?.city].filter(Boolean).join(', ');
  const amaDate=document.getElementById('amaDate').value?new Date(document.getElementById('amaDate').value+'T00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'—';
  const o1Name=propData.owner_broker_name||'Owner';
  const o1Amt=Number(document.getElementById('owner1Amt').value)||0;
  const o2Name=propData.co_owner||'';
  const o2Amt=Number(document.getElementById('owner2Amt')?.value)||0;
  let amtHtml=`<li><strong>${o1Name}:</strong> INR ${o1Amt.toLocaleString('en-IN')}</li>`;
  if(o2Name&&o2Amt)amtHtml+=`<li><strong>${o2Name}:</strong> INR ${o2Amt.toLocaleString('en-IN')}</li>`;
  const toList=[propData.owner_email,propData.co_owner_email,propData.third_owner_email,'accounts@openhouse.in'].filter(Boolean).join(', ');
  const _city=(propData?.city||'').toLowerCase();
  const _cityCc=_city.includes('gurgaon')||_city.includes('gurugram')?'shashank.kumar@openhouse.in':_city.includes('ghaziabad')||_city.includes('gzb')?'animesh.singh@openhouse.in':_city.includes('noida')?'abhishek.rathore@openhouse.in':null;
  const _ccArr=['supply@openhouse.in','bookings@openhouse.in',_cityCc].filter(Boolean);
  const _existCc=[...toList.split(','),..._ccArr].map(x=>x.trim().toLowerCase());
  const _staffCc=[propData?.assigned_by_email,propData?.token_requested_by_email].filter(Boolean).filter(e=>!_existCc.includes(e.toLowerCase()));
  const ccList=[..._ccArr,..._staffCc].join(', ');
  const amaUrl=propData.signed_ama_url;
  let coDocHtml='';
  if(o2Name){
    if(propData.co_owner_cheque_url)coDocHtml+=`<p><strong>Co Owner Cancelled Cheque:</strong> <a href="${propData.co_owner_cheque_url}" style="color:#1a73e8">Click here to view</a></p>`;
    if(propData.co_owner_pan_url)coDocHtml+=`<p><strong>Co Owner PAN Card:</strong> <a href="${propData.co_owner_pan_url}" style="color:#1a73e8">Click here to view</a></p>`;
    if(propData.co_owner_aadhaar_front_url)coDocHtml+=`<p><strong>Co Owner Aadhaar Card Front:</strong> <a href="${propData.co_owner_aadhaar_front_url}" style="color:#1a73e8">Click here to view</a></p>`;
    if(propData.co_owner_aadhaar_back_url)coDocHtml+=`<p><strong>Co Owner Aadhaar Card Back:</strong> <a href="${propData.co_owner_aadhaar_back_url}" style="color:#1a73e8">Click here to view</a></p>`;
  }
  const html=`<div style="font-size:13px;line-height:1.8">
<p><strong>To:</strong> ${toList}</p>
<p><strong>CC:</strong> ${ccList}</p>
<p><strong>Subject:</strong> ${currentUid} - Openhouse Offer | ${propData?.tower_no||''} ${propData?.unit_no||''} - ${propData?.society_name||'Property'} | ${o1Name}</p>
<hr style="border:none;border-top:1px solid var(--bd);margin:10px 0">
<p>Dear <strong>${o1Name}</strong>,</p>
<p>Congratulations on the successful execution of the Asset Management Agreement dated <strong>${amaDate}</strong>.</p>
<p>Please find the link to executed copy of the agreement for your reference. Kindly acknowledge receipt of this document by replying to this thread. Upon receiving your acknowledgement, the Accounts Team will release the remaining amount as follows:</p>
<p><strong>Property:</strong> ${addr}</p>
<ul style="line-height:2">${amtHtml}</ul>
<p>Hi Accounts Team, please do the needful.</p>
${coDocHtml}
${amaUrl?`<p><strong>AMA Link:</strong> <a href="${amaUrl}" style="color:#1a73e8">Click here to view AMA</a></p>`:''}
</div>`;
  document.getElementById('emailPreviewBody').innerHTML=html;
  document.getElementById('emailModal').classList.add('open');
});
function closeEmailModal(){document.getElementById('emailModal').classList.remove('open')}
document.getElementById('emailModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeEmailModal()});
document.getElementById('confirmSendBtn').addEventListener('click',async()=>{
  const btn=document.getElementById('confirmSendBtn');btn.disabled=true;btn.textContent='Sending...';
  try{
    const o1Amt=document.getElementById('owner1Amt').value||'0';
    const o2Amt=document.getElementById('owner2Amt')?.value||'';
    const r=await fetch(`${API}/api/pending-request/send-email/${currentUid}`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({owner1_name:propData.owner_broker_name||'Owner',owner1_amount:o1Amt,owner2_name:propData.co_owner||'',owner2_amount:o2Amt})});
    const d=await r.json();if(!r.ok)throw new Error(d.error);
    toast('Email sent to Accounts!','ok',5000);closeEmailModal();
    const eb=document.getElementById('emailBtn');eb.disabled=true;eb.innerHTML='✓ Email Sent Already';eb.style.borderColor='var(--grn)';eb.style.color='var(--grn)';
  }catch(e){toast(e.message||'Failed','err');
    if(e.message&&e.message.includes('log out'))toast('Please logout and login again','warn',8000);
  }finally{btn.disabled=false;btn.textContent='✉ Confirm & Send'}
});
</script>
</body></html>
