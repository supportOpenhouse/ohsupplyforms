<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>Openhouse — Forms</title><link rel="icon" type="image/png" href="/images/favicon.png">
<link rel="stylesheet" href="/css/styles.css">
<style>
.form-grid{display:grid;gap:8px;margin-top:10px}
.form-link{display:flex;align-items:center;gap:12px;padding:14px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);text-decoration:none;color:var(--tx);transition:.15s;box-shadow:var(--sh)}
.form-link:hover{border-color:var(--ac);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.fl-num{width:32px;height:32px;border-radius:50%;background:var(--ac);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.fl-body{flex:1}.fl-title{font-size:13px;font-weight:700}.fl-desc{font-size:10px;color:var(--tx3);margin-top:1px}
.fl-arrow{color:var(--tx3);font-size:16px}
.fl-icon{width:32px;height:32px;border-radius:50%;background:var(--ac2);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.admin-link{margin-top:8px;display:block;text-align:center;padding:12px;background:var(--ac);color:#fff;border-radius:var(--r);text-decoration:none;font-size:13px;font-weight:700}
.admin-link:hover{background:#1f2937}
.user-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:10px;box-shadow:var(--sh)}
.user-info{font-size:12px;color:var(--tx2)}.user-info strong{color:var(--tx)}
.logout-btn{font-size:11px;color:var(--red);text-decoration:none;font-weight:600;padding:4px 10px;border:1px solid #fecaca;border-radius:var(--r)}
.logout-btn:hover{background:var(--rbg)}
</style></head>
<body>
<header class="hdr">
  <a href="/" class="hdr-logo"><img src="/images/logo_2.png" alt="Openhouse" style="height:32px"></a>
  <div class="hdr-center"></div>
  <div class="hdr-right"></div>
</header>
<div class="ctn">
  <div class="user-bar">
    <div class="user-info">Signed in as <strong id="userName">...</strong></div>
    <a href="/auth/logout" class="logout-btn">Logout</a>
  </div>

  <div class="card">
    <div class="card-t">Your Forms</div>
    <div class="card-d">Forms you have access to.</div>
    <div class="form-grid" id="formGrid"></div>
    <div id="noForms" style="display:none;text-align:center;padding:20px;color:var(--tx3);font-size:13px">No forms assigned. Contact your admin.</div>
  </div>

  <div class="card" style="margin-top:10px">
    <div class="form-grid">
      <a href="/my-properties" class="form-link">
        <div class="fl-icon">📋</div>
        <div class="fl-body"><div class="fl-title">My Properties</div></div>
        <div class="fl-arrow">→</div>
      </a>
    </div>
  </div>

  <a href="/admin" class="admin-link" id="adminLink" style="display:none">Admin Dashboard</a>
</div>

<script>
const FORMS=[
  {key:'schedule',num:1,title:'Visit Schedule',desc:'Create a new visit schedule & UID',href:'/schedule'},
  {key:'visit',num:2,title:'Visit Form (Audit Form)',desc:'Property inspection & room details',href:'/visit'},
  {key:'token-request',num:3,title:'Token Request (For Internal Team)',desc:'Token amount, deal terms & documents',href:'/token-request'},
  {key:'token-deal',num:4,title:'Deal Terms (For Owner)',desc:'Confirm token & preview deal',href:'/token-deal'},
  {key:'ama-details',num:5,title:'Property Documents for AMA (For Legal Team)',desc:'Property documents for AMA',href:'/ama-details'},
  {key:'pending-request',num:6,title:'AMA Acknowledgement & Pending Amount Request (For Owner & Internal Team)',desc:'AMA date, payment split & email to accounts',href:'/pending-request'},
  {key:'listing',num:7,title:'Listing Details',desc:'Prepare property for listing',href:'/listing'},
  {key:'cp-bill',num:8,title:'CP Bill Generation (For Internal Team)',desc:'CP details, documents & email to accounts',href:'/cp-bill'},
  {key:'final',num:9,title:'Key Handover Acknowledgement (For Owner)',desc:'Key handover date & email to owner',href:'/final'}
];
document.addEventListener('DOMContentLoaded',async()=>{
  try{
    const r=await fetch('/auth/me');if(!r.ok){window.location.href='/login';return}
    const user=await r.json();
    document.getElementById('userName').textContent=user.name||user.email;
    const grid=document.getElementById('formGrid');
    const allowed=user.allowed_forms||[];const hasAll=allowed.includes('*')||user.is_admin;
    const visible=FORMS.filter(f=>hasAll||allowed.includes(f.key));
    if(!visible.length){document.getElementById('noForms').style.display='block';return}
    visible.forEach(f=>{
      grid.innerHTML+=`<a href="${f.href}" class="form-link"><div class="fl-num">${f.num}</div><div class="fl-body"><div class="fl-title">${f.title}</div></div><div class="fl-arrow">→</div></a>`;
    });
    if(user.is_admin||allowed.includes('admin_p'))document.getElementById('adminLink').style.display='block';
  }catch(e){window.location.href='/login'}
});
</script>
</body></html>
